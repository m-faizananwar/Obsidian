<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian Todo | Professional Edition</title>
    
    <!-- Favicon -->
    <link rel="icon" href="/image/obs.jpg" type="image/jpeg">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="./src/styles/main.css">
    
    <!-- External Icon Support (FontAwesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>

<body class="bg-pastel-nebulaBg text-pastel-darkText font-cute">
    <!-- Lottie decorations (Kept from original design) -->
    <div class="lottie-corner top-0 left-0 fixed z-50 pointer-events-none">
        <dotlottie-player src="https://lottie.host/d181ebe8-9310-4d10-9cb7-cf0409473cd8/zBtILf7o0o.lottie" background="transparent" speed="1" style="width: 120px; height: 120px" loop autoplay></dotlottie-player>
    </div>
    
    <div class="lottie-corner top-0 right-0 fixed z-50 pointer-events-none float-animation">
        <dotlottie-player src="https://lottie.host/27564a95-50ef-4497-8d67-0589add4b0f8/GcGzQSxFbg.lottie" background="transparent" speed="1" style="width: 110px; height: 110px" loop autoplay></dotlottie-player>
    </div>
    
    <div class="lottie-corner bottom-0 left-0 fixed z-50 pointer-events-none">
        <dotlottie-player src="https://lottie.host/326d5b32-1e45-4259-a719-118dacf8737b/rW1FtiKu7Q.lottie" background="transparent" speed="1" style="width: 140px; height: 140px" loop autoplay></dotlottie-player>
    </div>
    
    <div class="lottie-corner bottom-0 right-0 fixed z-50 pointer-events-none">
        <dotlottie-player src="https://lottie.host/7777fef1-871b-4a4a-887e-d1cdac657889/7JzC94vmLG.lottie" background="transparent" speed="1" style="width: 150px; height: 150px" loop autoplay></dotlottie-player>
    </div>
    
    <div class="flex h-screen overflow-hidden flex-col md:flex-row relative z-10 transition-opacity duration-500" id="app-container">
        <!-- Sidebar -->
        <aside class="w-full md:w-64 bg-opacity-80 bg-pastel-darkBg p-4 flex flex-col shadow-lg backdrop-blur-md border-r border-pastel-muted border-opacity-10">
            <!-- Vault selector -->
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center bg-pastel-darkBg bg-opacity-50 px-3 py-2 rounded-lg border border-pastel-muted border-opacity-20 w-full cursor-pointer hover:bg-opacity-70 transition-all" id="vault-selector">
                    <i class="fas fa-folder text-xl mr-2 text-pastel-accent"></i>
                    <span id="current-vault-name" class="text-sm text-pastel-darkText truncate">Loading vault...</span>
                    <i class="fas fa-chevron-down ml-auto text-pastel-muted text-xs"></i>
                </div>
            </div>
            
            <h1 class="text-2xl font-bold text-pastel-accent mb-6 flex items-center">
                <i class="fas fa-star text-lg mr-2 animate-pulse"></i> Dreamy Notes
            </h1>
            
            <div class="mb-4">
                <button id="new-task-btn" class="bg-pastel-accent bg-opacity-20 hover:bg-opacity-40 text-pastel-accent w-full py-2.5 rounded-xl flex items-center justify-center transition-all border border-pastel-accent border-opacity-20">
                    <i class="fas fa-pencil-alt text-sm mr-2"></i> New Task
                </button>
            </div>
            
            <div class="text-xs font-bold text-pastel-muted mb-2 tracking-widest uppercase">
                Tasks
            </div>
            <ul id="tasks-list" class="overflow-y-auto space-y-1 flex-grow pr-1">
                <!-- Task links generated by main.js -->
            </ul>
            
            <div class="mt-auto pt-4 border-t border-pastel-muted border-opacity-10">
                <button id="graph-view-btn" class="btn-secondary w-full py-2 text-pastel-muted hover:text-pastel-accent transition-all flex items-center justify-center hover:scale-105">
                    <i class="fas fa-project-diagram mr-2"></i> Graph View
                </button>
            </div>
        </aside>
        
        <!-- Main content -->
        <main class="flex-1 flex flex-col overflow-hidden bg-transparent">
            <!-- Input area -->
            <div class="p-6 border-b border-pastel-muted border-opacity-10 bg-pastel-darkBg bg-opacity-40 backdrop-blur-sm">
                <div class="relative max-w-4xl mx-auto w-full">
                    <i class="fas fa-plus absolute left-4 top-1/2 -translate-y-1/2 text-pastel-muted"></i>
                    <input type="text" id="item" 
                           class="w-full p-4 pl-12 rounded-2xl bg-pastel-darkBg bg-opacity-60 border border-pastel-muted border-opacity-20 
                                  text-pastel-darkText placeholder-pastel-muted focus:outline-none focus:border-pastel-accent transition-all shadow-xl" 
                           autofocus placeholder="Create a new task...">
                </div>
            </div>
            
            <!-- Task and notes area -->
            <div class="flex flex-1 overflow-hidden flex-col md:flex-row">
                <!-- Tasks column -->
                <section class="w-full md:w-1/2 p-6 overflow-y-auto bg-pastel-darkBg bg-opacity-20">
                    <h2 class="text-lg font-bold mb-6 text-pastel-accent flex items-center uppercase tracking-widest">
                        <i class="fas fa-list-ul mr-2 text-sm"></i> Focus List
                    </h2>
                    <ul id="to-do-box" class="space-y-4">
                        <!-- Tasks go here -->
                    </ul>
                </section>
                
                <!-- Notes column -->
                <section class="w-full md:w-1/2 md:border-l border-pastel-muted border-opacity-10 p-6 overflow-y-auto bg-pastel-darkBg bg-opacity-30">
                    <h2 class="text-lg font-bold mb-6 text-pastel-accent flex items-center uppercase tracking-widest">
                        <i class="fas fa-sticky-note mr-2 text-sm"></i> Note Details
                    </h2>
                    
                    <div id="task-notes" class="glass-effect rounded-2xl p-6 min-h-[300px] transition-all">
                        <div id="notes-placeholder" class="text-center py-20">
                            <i class="fas fa-mouse-pointer text-4xl text-pastel-muted opacity-20 mb-4 block"></i>
                            <p class="text-pastel-muted">Select a task to explore its thoughts</p>
                        </div>
                        
                        <div id="notes-editor" class="hidden">
                            <div class="mb-6 flex justify-between items-center bg-pastel-darkBg bg-opacity-50 p-3 rounded-xl border border-pastel-muted border-opacity-10">
                                <span class="text-pastel-darkText font-medium text-sm truncate max-w-[70%]" id="current-task-title">Task</span>
                                <button id="add-note-btn" class="bg-pastel-accent bg-opacity-30 hover:bg-opacity-100 hover:text-pastel-darkBg text-pastel-accent px-3 py-1 rounded-lg text-xs font-bold transition-all uppercase tracking-tighter">
                                    <i class="fas fa-plus mr-1"></i> Add
                                </button>
                            </div>
                            
                            <div id="notes-container" class="space-y-4"></div>
                            
                            <div id="new-note-form" class="mt-6 hidden animate-in slide-in-from-bottom-4 duration-300">
                                <textarea id="note-content" 
                                          class="w-full h-40 bg-pastel-darkBg bg-opacity-60 border border-pastel-muted border-opacity-20 rounded-xl p-4 mb-3 
                                                 text-pastel-darkText text-sm focus:outline-none focus:border-pastel-accent shadow-inner resize-none" 
                                          placeholder="Capture your thoughts here..."></textarea>
                                          
                                <div class="flex justify-end space-x-3">
                                    <button id="cancel-note-btn" class="px-4 py-2 rounded-xl text-sm text-pastel-muted hover:text-pastel-accent transition-all uppercase font-bold tracking-widest">
                                        Cancel
                                    </button>
                                    <button id="save-note-btn" class="bg-pastel-accent px-6 py-2 rounded-xl text-sm text-pastel-darkBg font-bold transition-all shadow-lg hover:-translate-y-1 active:scale-95 uppercase tracking-widest">
                                        Save Note
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
            
            <!-- Graph view -->
            <div id="graph-container" class="fixed inset-0 bg-[#0c051a] bg-opacity-95 z-[100] hidden items-center justify-center p-4">
                <div class="absolute top-6 right-6 flex space-x-4 z-[110]">
                    <button id="refresh-graph-btn" class="w-10 h-10 flex items-center justify-center rounded-full bg-pastel-accent bg-opacity-10 hover:bg-opacity-100 text-pastel-accent hover:text-pastel-darkBg transition-all">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                    <button id="close-graph-btn" class="w-10 h-10 flex items-center justify-center rounded-full bg-pastel-secondary bg-opacity-10 hover:bg-opacity-100 text-pastel-secondary hover:text-pastel-darkBg transition-all">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                
                <div class="absolute top-6 left-6 flex items-center space-x-3 bg-pastel-darkBg bg-opacity-70 px-4 py-2 rounded-xl border border-pastel-accent border-opacity-20 backdrop-blur-sm z-[110]">
                    <i class="fas fa-project-diagram text-pastel-accent"></i>
                    <span class="text-sm font-bold text-pastel-darkText uppercase tracking-widest">Knowledge Galaxy</span>
                </div>
                
                <div id="graph-canvas" class="w-full h-full cursor-grab active:cursor-grabbing"></div>
                <div id="graph-tooltip" class="hidden absolute bg-pastel-darkBg bg-opacity-90 p-4 rounded-2xl shadow-2xl border border-pastel-accent border-opacity-30 max-w-xs backdrop-blur-md z-[120]"></div>
                
                <div id="graph-loading" class="absolute inset-0 flex items-center justify-center bg-pastel-darkBg bg-opacity-80 z-[130] hidden">
                    <div class="animate-spin-slow text-pastel-accent">
                        <i class="fas fa-spinner text-5xl"></i>
                    </div>
                </div>
                
                <div class="graph-help-text">
                    Scroll to zoom • Drag to navigate • Drag nodes to interact
                </div>
            </div>
        </main>
    </div>
    
    <!-- Vault modal -->
    <div id="vault-modal" class="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-[200] hidden">
        <div class="bg-[#1a1127] p-8 rounded-3xl shadow-2xl border border-pastel-accent border-opacity-20 w-11/12 max-w-md transform animate-in zoom-in-95 duration-300">
            <h3 class="text-xl font-bold mb-8 text-pastel-accent flex items-center uppercase tracking-tighter">
                <i class="fas fa-archive mr-2"></i> Select Your Vault
            </h3>
            
            <div id="vaults-list" class="space-y-3 mb-8 max-h-[40vh] overflow-y-auto pr-2 custom-scrollbar"></div>
            
            <div class="border-t border-pastel-muted border-opacity-10 pt-6">
                <div class="flex items-center gap-3">
                    <input type="text" id="new-vault-name" placeholder="New vault name..." 
                           class="flex-1 p-3 rounded-xl bg-pastel-darkBg bg-opacity-60 border border-pastel-muted border-opacity-20 
                                  text-pastel-darkText text-sm focus:outline-none focus:border-pastel-accent">
                    <button id="create-vault-btn" class="bg-pastel-accent bg-opacity-20 hover:bg-opacity-100 text-pastel-accent hover:text-pastel-darkBg px-6 py-3 rounded-xl text-sm font-bold transition-all uppercase tracking-widest">
                        Create
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script type="module" src="./src/main.js"></script>
</body>
</html>
